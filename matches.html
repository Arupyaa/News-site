<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matches</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css">
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-secondary-subtle mb-4">
            <div class="container-fluid">
                <a class="navbar-brand ms-5" href="#">
                    <img src="images/news.svg" alt="Logo" width="50" class="d-inline-block align-text-middle" />
                    News Center
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav nav-underline ms-3 w-25 d-flex gap-5 justify-content-around">
                        <li class="nav-item fw-bold">
                            <a class="nav-link" aria-current="page" href="index.html">Home</a>
                        </li>
                        <li class="nav-item fw-bold">
                            <a class="nav-link active" href="matches.html">Matches</a>
                        </li>
                        <li class="nav-item fw-bold">
                            <a class="nav-link" href="standings.html">Standings</a>
                        </li>
                        <li class="nav-item fw-bold">
                            <a class="nav-link" href="stats.html">Stats</a>
                        </li>
                    </ul>
                </div>
        </nav>
    </header>
    <main class="container">
        <section id="live-match-section">
            <div class="d-flex">
                <h2 class="mb-3">Live Matches</h2>
                <form class="ms-3">
                    <select class="league-select form-select">
                    </select>
                </form>
            </div>
            <div class="live-matches"></div>

        </section>
        <section id="to-from-match-section" class="mt-4">
            <h2 class="mb-3">Search Matches</h2>
            <!--from and to date form-->
            <form class="d-flex justify-content-around">
                <label class="form-label">
                    Date from
                    <input type="date" name="date-from" id="date-from" class="form-control">
                </label>
                <label class="form-label">
                    Date To
                    <input type="date" name="date-to" id="date-to" class="form-control">
                </label>
                <button
                    class="search-button bg-transparent rounded-circle align-self-center d-flex align-items-center justify-content-center border-0 shadow-lg"
                    href="#" style="width: 50px; height: 50px;" type="button">
                    <i class="material-symbols-outlined">
                        search
                    </i>
                </button>
            </form>
            <div class="to-from-section"> <!--accordion idea placeholder-->

                <!--actual live matches section-->



            </div>
        </section>
    </main>

    <script src="js/leagues.js"></script>
    <script src="js/matches.js"></script>
</body>

</html>
